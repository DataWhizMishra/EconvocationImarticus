<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentor Login — E-Convocation Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/theme.css">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  .login-card{max-width:380px;width:100%;text-align:center;}
  .login-logo{width:52px;height:52px;background:var(--brand);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#000;margin:0 auto 16px;}
  .login-tt{font-family:var(--fb);font-size:32px;letter-spacing:1px;margin-bottom:6px;}
  .login-sub{font-size:12px;color:var(--muted);margin-bottom:26px;}
</style>
</head>
<body>
<div class="login-card card">
  <div class="login-logo">IL</div>
  <div class="login-tt">Mentor Access</div>
  <div class="login-sub">E-Convocation admin — batches, rosters, quizzes &amp; polls</div>
  <div class="field" style="text-align:left;">
    <label class="field-label">Password</label>
    <input type="password" id="pw" placeholder="••••••••" autofocus>
  </div>
  <div id="errorBox"></div>
  <button class="btn" id="loginBtn" style="width:100%;justify-content:center;">Log In</button>
</div>

<script src="/assets/api.js"></script>
<script src="/assets/auth-client.js"></script>
<script>
function showError(msg){
  document.getElementById('errorBox').innerHTML = msg ? `<div class="error-box">${msg}</div>` : '';
}
async function doLogin(){
  showError('');
  const password = document.getElementById('pw').value;
  if(!password){ showError('Enter the mentor password.'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Logging in…';
  try{
    const res = await Api.apiPost('auth-login', { password });
    AuthClient.setMentorToken(res.token);
    const params = new URLSearchParams(window.location.search);
    window.location.href = params.get('next') || '/admin/dashboard.html';
  }catch(e){
    showError(e.message || 'Login failed.');
    btn.disabled = false; btn.textContent = 'Log In';
  }
}
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('pw').addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
